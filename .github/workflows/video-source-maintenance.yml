# Video Source Maintenance
# v0.3.7+72 (6/19): 老板要求在 GitHub 代码里增加视频源维护
# 触发: schedule (cron 02:00 UTC), workflow_dispatch (手动), push (paths)

name: Video Source Maintenance

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: '只探测, 不写文件 + 不 commit'
        type: boolean
        default: false
  push:
    paths:
      - 'scripts/discover_known_sources.py'
      - 'scripts/sync_known_sources.py'
      - 'scripts/discover_cctv_sources.py'
      - 'scripts/sync_cctv_top1.py'
      - 'assets/data/known_sources.json'
      - 'assets/data/cctv_candidates.json'

concurrency:
  group: video-source-maintenance
  cancel-in-progress: false

jobs:
  discover-and-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.IPTV_CI_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 准备目录
        run: mkdir -p assets/data scripts

      - name: 跑 discover_known_sources
        id: discover_known
        run: |
          cd scripts
          python3 discover_known_sources.py --workers 30 --timeout 5

      - name: 跑 sync_known_sources
        if: success()
        run: |
          cd scripts
          python3 sync_known_sources.py --max-per-channel 3

      - name: 跑 sync_cctv_top1
        if: success()
        run: |
          cd scripts
          python3 sync_cctv_top1.py || true

      - name: 跑 discover_cctv_sources
        if: success()
        run: |
          cd scripts
          python3 discover_cctv_sources.py --workers 30 --timeout 5 || true

      - name: 报告变更
        if: success()
        run: |
          echo "=== 变更统计 ==="
          git diff --stat assets/data/known_sources.json assets/data/cctv_sources.json assets/data/candidates.json || echo "无变更"

      - name: Auto-commit
        if: success()
        run: |
          git config user.email "openclaw@threel.site"
          git config user.name "小七 (OpenClaw)"

          if git diff --quiet assets/data/known_sources.json assets/data/cctv_sources.json assets/data/candidates.json; then
            echo "✅ 无变更"
            exit 0
          fi

          echo "=== 检测到变更 ==="
          git diff --stat assets/data/known_sources.json assets/data/cctv_sources.json assets/data/candidates.json

          git add assets/data/known_sources.json assets/data/cctv_sources.json assets/data/candidates.json
          git commit -m "chore(sources): auto-update iptv-org sources (bot=OpenClaw workflow=Video Source Maintenance)"
          git remote set-url origin https://x-access-token:${{ secrets.IPTV_CI_TOKEN }}@github.com/aqiyoung/iptv-app.git
          git push origin main
          echo "✅ commit + push 完成"

      - name: Telegram 通知 (失败)
        if: failure()
        run: |
          if [ -n "${{ secrets.TELEGRAM_BOT_TOKEN }}" ] && [ -n "${{ secrets.TELEGRAM_CHAT_ID }}" ]; then
            curl -sS -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
              -d parse_mode="Markdown" \
              -d text="⚠️ *iptv-app Video Source Maintenance failed*
Run: ${{ github.run_id }}"
          fi
