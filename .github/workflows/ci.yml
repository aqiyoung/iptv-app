name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.IPTV_CI_TOKEN }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Verify formatting (auto-fix + commit on dirty)
        run: |
          set -e
          # P2-1 (6/18) fix: actions/checkout@v4 在 PR context 默认是 detached HEAD,
          #  `git push` 无 refspec 会报错 "You are not currently on a branch." 
          #  创建本地分支头, push 时指名 refspec 才能推回 PR 分支.
          if [ -n "${GITHUB_HEAD_REF:-}" ]; then
            git fetch origin "refs/heads/${GITHUB_HEAD_REF}:refs/remotes/origin/${GITHUB_HEAD_REF}"
            git checkout -B "${GITHUB_HEAD_REF}" "origin/${GITHUB_HEAD_REF}"
            echo "Reattached to branch: ${GITHUB_HEAD_REF} (at origin/${GITHUB_HEAD_REF})"
          fi
          if ! dart format --output=none --set-exit-if-changed .; then
            echo "Auto-formatting dirty files..."
            dart format .
            git config user.email "openclaw@threel.site"
            git config user.name "小七 (OpenClaw)"
            git remote set-url origin https://x-access-token:${{ secrets.IPTV_CI_TOKEN }}@github.com/aqiyoung/iptv-app.git
            git add -A
            if ! git diff --staged --quiet; then
              git commit -m "style: auto-fix dart format"
              # 推送指名 refspec — PR context 下 HEAD 是 detached, 
              #  需用 github.head_ref (PR 源分支) 才能 push 回去.
              git push origin "HEAD:refs/heads/${GITHUB_HEAD_REF}"
              echo "Committed and pushed dart format fixes"
            fi
          fi

      - name: Analyze
        # --no-fatal-infos: info 级 lints (例如 prefer_const_constructors) 
        # 不阻断 CI, 避免老板提交后被一个不重要的 lint 警告打归.
        # error + warning 仍 fatal.  卡 6 修复后收敛.
        run: flutter analyze

      - name: Run tests
        run: flutter test
