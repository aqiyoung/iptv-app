name: Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Restore keystore from secret
        env:
          KEYSTORE_BASE64: ${{ secrets.IPTV_KEYSTORE_BASE64 }}
        run: |
          set -e
          mkdir -p android
          echo "$KEYSTORE_BASE64" | base64 -d > android/iptv-release.jks
          ls -la android/iptv-release.jks
          keytool -list -keystore android/iptv-release.jks \
            -storepass "${{ secrets.IPTV_KEYSTORE_PASSWORD }}" 2>&1 | head -10

      - name: Write android/key.properties
        env:
          STORE_FILE: iptv-release.jks
          STORE_PASSWORD: ${{ secrets.IPTV_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.IPTV_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.IPTV_KEY_PASSWORD }}
        run: |
          cat > android/key.properties << EOF
          storeFile=$STORE_FILE
          storePassword=$STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF
          cat android/key.properties

      - name: Bootstrap android/ios scaffold if missing
        run: |
          set -e
          if [ ! -d "android/app" ] || [ ! -d "ios" ]; then
            flutter create --org com.threely.iptv --project-name iptv_app \
              --platforms=android,ios .
          fi
          test -f pubspec.yaml
          test -f lib/main.dart
          test -f test/widget_test.dart

      - name: Patch android/app/build.gradle for signing
        run: |
          set -e
          if ! grep -q "loadKeyProperties" android/app/build.gradle; then
            python3 << 'PYEOF'
          import re
          p = 'android/app/build.gradle'
          with open(p) as f:
              src = f.read()
          # Insert loadKeyProperties def block BEFORE "android {" line
          inject = '''
          def loadKeyProperties() {
              def kp = new Properties()
              def f = file('key.properties')
              if (f.exists()) {
                  kp.load(new FileInputStream(f))
              }
              return kp
          }
          def keyProps = loadKeyProperties()
          def storeFilePath = keyProps['storeFile'] ?: null
          def storePassword = keyProps['storePassword'] ?: null
          def keyAlias = keyProps['keyAlias'] ?: null
          def keyPassword = keyProps['keyPassword'] ?: null
          '''
          src = re.sub(r'(\n\s*android\s*\{)', inject + r'\1', src, count=1)
          # Add signingConfigs block right after "android {"
          signing = '''
              signingConfigs {
                  release {
                      if (storeFilePath && storePassword && keyAlias && keyPassword) {
                          storeFile file(storeFilePath)
                          storePassword storePassword
                          keyAlias keyAlias
                          keyPassword keyPassword
                      }
                  }
              }
          '''
          src = re.sub(r'(\n\s*android\s*\{\n)', r'\1' + signing, src, count=1)
          # Replace any existing signingConfig = ... line in buildTypes.release
          # with signingConfig signingConfigs.release
          # Match: buildTypes { ... release { ... signingConfig ... } ... }
          def replace_signing(match):
              block = match.group(0)
              # Strip any existing signingConfig = ...
              block = re.sub(r'\n\s*signingConfig\s*=?\s*\S+', '', block)
              # Inject our signingConfig before the final closing brace of release {}
              block = re.sub(
                  r'(release\s*\{[^{}]*?)(\n\s*\})',
                  r'\1\n        signingConfig signingConfigs.release\n\2',
                  block,
                  count=1
              )
              return block
          src = re.sub(
              r'buildTypes\s*\{[^{}]*?release\s*\{[^{}]*?\}',
              replace_signing,
              src,
              count=1
          )
          with open(p, 'w') as f:
              f.write(src)
          print('Patched', p)
          PYEOF
          fi
          echo "--- build.gradle (signing parts) ---"
          grep -nE "signingConfig|storeFile|signingConfigs" android/app/build.gradle || echo "(no signing config found!)"
          echo "--- full build.gradle ---"
          cat android/app/build.gradle

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (release, signed)
        run: flutter build apk --release

      - name: Verify APK signature
        run: |
          set -e
          APK=build/app/outputs/flutter-apk/app-release.apk
          ls -la $APK
          sha256sum $APK
          # Find apksigner from any installed Android SDK on the runner
          APKSIGNER=$(find /opt -name 'apksigner' 2>/dev/null | head -1)
          if [ -n "$APKSIGNER" ]; then
            echo "Using apksigner: $APKSIGNER"
            $APKSIGNER verify --verbose $APK
            $APKSIGNER verify --print-certs $APK
          else
            echo "apksigner not on PATH; falling back to jarsigner"
            jarsigner -verify -verbose:summary -certs $APK 2>&1 | head -10
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: iptv-app-release
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
          fail_on_unmatched_files: true
