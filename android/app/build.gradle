plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.threelive.tv"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        // v0.3.0 (6/17 老板拍): com.threelive.iptv → com.threelive.tv
        // (品牌保留, 后缀 .tv 跟 IPTV 电视场景对齐, 跟 .iptv 重复了)
        applicationId = "com.threelive.tv"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
        // ABI 限定在 release.yml 用 --target-platform android-arm64 + --split-per-abi 控制
        // 不要在这里加 ndk.abiFilters, 否则会跟 split-per-abi 冲突:
        //   "Conflicting configuration : 'arm64-v8a' in ndk abiFilters
        //    cannot be present when splits abi filters are set : arm64-v8a"
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}
